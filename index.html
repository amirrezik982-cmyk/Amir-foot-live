<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كورة لايف - بث مباشر مباريات اليوم</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; background-color: #080d18;">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const STREAM_SITE = "https://majed-koora.co/";

        const LEAGUES = [
          { id: "world_cup",        name: "كأس العالم 2026",   icon: "🌍", color: "#FFD700", hasStream: true },
          { id: "champions_league", name: "دوري أبطال أوروبا", icon: "⭐", color: "#1B458F", hasStream: true },
          { id: "la_liga",          name: "الدوري الإسباني",   icon: "🇪🇸", color: "#EE0000", hasStream: false },
        ];

        const STATUS_COLORS = {
          scheduled: "#94a3b8",
          live:      "#22c55e",
          halftime:  "#f59e0b",
          finished:  "#64748b",
        };

        // قاعدة بيانات محلية للمباريات لضمان عمل الموقع فوراً بدون اشتراكات مدفوعة
        const MOCK_DATA = {
          world_cup: [
            { home: "الأرجنتين", homeLogo: "https://flagcdn.com/w80/ar.png", away: "فرنسا", awayLogo: "https://flagcdn.com/w80/fr.png", homeScore: 2, awayScore: 1, status: "live", minute: "65", time: "19:00", league: "كأس العالم 2026", round: "دور المجموعات", venue: "استاد لوسيل" },
            { home: "البرازيل", homeLogo: "https://flagcdn.com/w80/br.png", away: "ألمانيا", awayLogo: "https://flagcdn.com/w80/de.png", homeScore: null, awayScore: null, status: "scheduled", minute: null, time: "22:00", league: "كأس العالم 2026", round: "دور المجموعات", venue: "استاد متلايف" }
          ],
          champions_league: [
            { home: "ريال مدريد", homeLogo: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg", away: "مانشستر سيتي", awayLogo: "https://upload.wikimedia.org/wikipedia/en/e/eb/Manchester_City_FC_badge.svg", homeScore: 3, awayScore: 3, status: "finished", minute: null, time: "انتهت", league: "دوري أبطال أوروبا", round: "ربع النهائي", venue: "سانتياغو برنابيو" }
          ],
          la_liga: [
            { home: "برشلونة", homeLogo: "https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona.svg", away: "أتلتيكو مدريد", awayLogo: "https://upload.wikimedia.org/wikipedia/en/f/f4/Atletico_Madrid_2017_logo.svg", homeScore: null, awayScore: null, status: "scheduled", minute: null, time: "18:00", league: "الدوري الإسباني", round: "الأسبوع 32", venue: "كامب نو" }
          ]
        };

        function TeamLogo({ url, size = 34 }) {
          const [err, setErr] = useState(false);
          if (err || !url) return <span style={{ fontSize: size * 0.75 }}>⚽</span>;
          return <img src={url} alt="" width={size} height={size} style={{ objectFit: "contain" }} onError={() => setErr(true)} />;
        }

        function StreamModal({ match, onClose }) {
          const [blocked, setBlocked] = useState(false);
          useEffect(() => { const t = setTimeout(() => setBlocked(true), 3500); return () => clearTimeout(t); }, []);

          return (
            <div style={{ position: "fixed", inset: 0, background: "#000", zIndex: 2000, display: "flex", flexDirection: "column" }}>
              <div style={{ background: "#0d1525", padding: "12px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid #ffffff10", flexShrink: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                  <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#ef4444", display: "inline-block", animation: "blink 1s infinite" }} />
                  <span style={{ color: "#f8fafc", fontWeight: 700, fontSize: "14px" }}>{match.home} ضد {match.away}</span>
                </div>
                <div style={{ display: "flex", gap: "8px" }}>
                  <button onClick={() => window.open(STREAM_SITE, "_blank")} style={{ background: "#1a1f2e", border: "1px solid #ffffff15", borderRadius: "8px", padding: "6px 12px", color: "#94a3b8", cursor: "pointer", fontSize: "12px" }}>🔗 فتح خارجي</button>
                  <button onClick={onClose} style={{ background: "none", border: "none", color: "#64748b", fontSize: "22px", cursor: "pointer" }}>✕</button>
                </div>
              </div>
              <div style={{ flex: 1, position: "relative", background: "#000" }}>
                {blocked ? (
                  <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "16px" }}>
                    <div style={{ fontSize: "52px" }}>📺</div>
                    <div style={{ color: "#e2e8f0", fontWeight: 700, fontSize: "18px" }}>البث جاهز</div>
                    <div style={{ color: "#64748b", fontSize: "13px", textAlign: "center", lineHeight: 1.7, maxWidth: "260px" }}>الموقع يمنع التضمين المباشر،<br />اضغط أدناه للمشاهدة</div>
                    <button onClick={() => window.open(STREAM_SITE, "_blank")} style={{ background: "linear-gradient(135deg,#ef4444,#b91c1c)", border: "none", borderRadius: "14px", padding: "14px 32px", color: "#fff", fontWeight: 800, fontSize: "16px", cursor: "pointer" }}>
                      🔴 شاهد المباراة الآن
                    </button>
                  </div>
                ) : (
                  <iframe src={STREAM_SITE} style={{ width: "100%", height: "100%", border: "none" }} allow="autoplay; fullscreen" allowFullScreen title="بث مباشر" onLoad={() => setBlocked(false)} />
                )}
              </div>
            </div>
          );
        }

        function MatchCard({ match, onDetail, onStream, hasStream }) {
          const isLive = match.status === "live";
          const statusColor = STATUS_COLORS[match.status] || "#94a3b8";
          const statusLabel = { scheduled: "لم تبدأ", live: "مباشر", finished: "انتهت" }[match.status] || match.status;

          return (
            <div style={{ background: "linear-gradient(135deg,#1a1f2e,#0f1520)", border: isLive ? "1px solid #22c55e44" : "1px solid #ffffff10", borderRadius: "16px", padding: "15px 17px", position: "relative" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "11px" }}>
                <span style={{ fontSize: "11px", color: "#64748b", fontWeight: 600 }}>{match.league} • {match.round}</span>
                <span style={{ fontSize: "11px", fontWeight: 700, padding: "3px 9px", borderRadius: "20px", background: isLive ? "#22c55e20" : "#ffffff10", color: statusColor }}>
                  {statusLabel}{isLive && match.minute ? ` ${match.minute}'` : ""}
                </span>
              </div>

              <div onClick={() => onDetail(match)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: "8px", cursor: "pointer" }}>
                <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "flex-end", gap: "5px" }}>
                  <TeamLogo url={match.homeLogo} size={34} />
                  <div style={{ color: "#e2e8f0", fontWeight: 700, fontSize: "13px" }}>{match.home}</div>
                </div>
                <div style={{ textAlign: "center", minWidth: "76px" }}>
                  {match.status === "scheduled"
                    ? <div style={{ color: "#94a3b8", fontSize: "16px", fontWeight: 700 }}>{match.time}</div>
                    : <div style={{ fontSize: "28px", fontWeight: 900, color: "#f8fafc", fontFamily: "monospace" }}>{match.homeScore}:{match.awayScore}</div>
                  }
                </div>
                <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "flex-start", gap: "5px" }}>
                  <TeamLogo url={match.awayLogo} size={34} />
                  <div style={{ color: "#e2e8f0", fontWeight: 700, fontSize: "13px" }}>{match.away}</div>
                </div>
              </div>

              {hasStream && (
                <button onClick={() => onStream(match)} style={{
                  marginTop: "12px", width: "100%",
                  background: isLive ? "linear-gradient(135deg,#ef444418,#b91c1c10)" : "#ffffff08",
                  border: isLive ? "1px solid #ef444444" : "1px solid #ffffff10",
                  borderRadius: "10px", padding: "8px", color: isLive ? "#f87171" : "#475569",
                  fontWeight: 700, fontSize: "13px", cursor: "pointer"
                }}>
                  {isLive ? "🔴 شاهد البث المباشر الآن" : "📺 شاهد عند انطلاق المباراة"}
                </button>
              )}
            </div>
          );
        }

        function DetailModal({ match, onClose }) {
          return (
            <div style={{ position: "fixed", inset: 0, background: "#000000cc", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center" }} onClick={onClose}>
              <div style={{ background: "#1a1f2e", padding: "26px", borderRadius: "24px", maxWidth: "400px", width: "100%", textAlign: "center" }} onClick={e => e.stopPropagation()}>
                <h3 style={{ color: "#fff", margin: "0 0 10px 0" }}>تفاصيل اللقاء</h3>
                <p style={{ color: "#94a3b8" }}>📍 الملعب: {match.venue}</p>
                <p style={{ color: "#94a3b8" }}>🏆 البطولة: {match.league}</p>
                <button onClick={onClose} style={{ marginTop: "15px", background: "#ef4444", color: "#fff", border: "none", padding: "8px 20px", borderRadius: "8px", cursor: "pointer" }}>إغلاق</button>
              </div>
            </div>
          );
        }

        function FootballApp() {
          const [activeLeague, setActiveLeague] = useState(LEAGUES[0]);
          const [matches, setMatches] = useState([]);
          const [detailMatch, setDetailMatch] = useState(null);
          const [streamMatch, setStreamMatch] = useState(null);

          useEffect(() => {
            setMatches(MOCK_DATA[activeLeague.id] || []);
          }, [activeLeague]);

          const liveCount = matches.filter(m => m.status === "live").length;

          return (
            <div style={{ minHeight: "100vh", background: "#080d18", fontFamily: "sans-serif", direction: "rtl", color: "#f8fafc", padding: "20px" }}>
              <div style={{ maxWidth: "700px", margin: "0 auto" }}>
                
                {/* Header */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
                  <div>
                    <h1 style={{ margin: 0, fontSize: "24px", color: "#3b82f6" }}>⚽ كورة لايف</h1>
                    <small style={{ color: "#475569" }}>مباريات اليوم وبث مباشر متاح</small>
                  </div>
                  {liveCount > 0 && <span style={{ background: "#22c55e20", color: "#22c55e", padding: "5px 10px", borderRadius: "20px", fontSize: "12px" }}>● {liveCount} مباشر</span>}
                </div>

                {/* Navigation Tabs */}
                <div style={{ display: "flex", gap: "10px", marginBottom: "20px", overflowX: "auto" }}>
                  {LEAGUES.map(l => (
                    <button key={l.id} onClick={() => setActiveLeague(l)} style={{
                      background: activeLeague.id === l.id ? "#1e293b" : "#111827",
                      border: `1px solid ${activeLeague.id === l.id ? l.color : "#ffffff10"}`,
                      color: "#fff", padding: "8px 16px", borderRadius: "20px", cursor: "pointer", whiteSpace: "nowrap"
                    }}>
                      {l.icon} {l.name}
                    </button>
                  ))}
                </div>

                {/* Matches List */}
                <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
                  {matches.map((m, i) => (
                    <MatchCard key={i} match={m} onDetail={setDetailMatch} onStream={setStreamMatch} hasStream={activeLeague.hasStream} />
                  ))}
                </div>
              </div>

              {detailMatch && <DetailModal match={detailMatch} onClose={() => setDetailMatch(null)} />}
              {streamMatch && <StreamModal match={streamMatch} onClose={() => setStreamMatch(null)} />}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FootballApp />);
    </script>
</body>
</html>
